name: Unit Tests + Deploy test omod

on:
  push:
    branches:
      - main
      - tesis-pruebasAut    

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 8
          cache: maven
          server-id: github
          server-username: module-bot
          server-password: MAVEN_TOKEN

      - name: Run unit tests
        run: mvn -B -pl api clean test

      - name: Upload Jacoco coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: api-jacoco-report
          path: api/target/site/jacoco

      - name: Deploy to GitHub Packages
        if: success()
        run: mvn -B deploy -DskipTests
        env:
          MAVEN_TOKEN: ${{ secrets.MODULE_TOKEN }}

      - name: Publish to GitHub Releases
        if: success()
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          OMOD_JAR=$(find omod/target -name "fua-omod-${VERSION}.jar" | grep -v sources | head -1)
          API_JAR=$(find api/target  -name "fua-api-${VERSION}.jar"  | grep -v sources | head -1)
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          gh release create "v${VERSION}" \
            --title "fua-omod v${VERSION}" \
            --notes "Maven artifacts for fua v${VERSION} — public download, no authentication required." \
            "$OMOD_JAR"  omod/pom.xml \
            "$API_JAR"   api/pom.xml \
            pom.xml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
