name: Unit Tests + Publish Maven Central

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 8
          cache: maven

      - name: Run unit tests
        run: mvn -B -pl api clean test
      
      - name: Upload Jacoco coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: api-jacoco-report
          path: api/target/site/jacoco

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'Merge pull request')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 8
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Check Maven Central version
        id: central-version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          URL="https://repo1.maven.org/maven2/io/github/proyecto-santaclotilde/fua-omod/${VERSION}/fua-omod-${VERSION}.pom"
          if curl -fsI "$URL" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already exists in Maven Central; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is not in Maven Central; publishing."
          fi

      - name: Publish to Maven Central
        if: steps.central-version.outputs.exists == 'false'
        run: mvn -B -P release deploy -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
